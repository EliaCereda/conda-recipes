on:
  push:
  workflow_dispatch:
    inputs:
      PACKAGE_DIR:
        description: "set package dir to build and archive your package"
        required: false
        default: gcc-arm-none-eabi

jobs:
  build:
    name: 🛠️ build on ${{ matrix.platform }}
    env:
      PACKAGE_DIR: ${{ github.event.inputs.PACKAGE_DIR || 'gcc-arm-none-eabi' }}

    strategy:
      # run all targets to completion, even if one fails
      fail-fast: false
      matrix:
        platform: [macos-15, macos-15-intel, ubuntu-24.04, ubuntu-24.04-arm, windows-2025]
    runs-on: ${{ matrix.platform }}

    # set bash to be a login shell, so that /etc/profile is sourced and conda
    # works
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v6

      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.12
          conda-build-version: ">=25.5.0,<26.2.0"
          environment-file: environment.yml
          auto-update-conda: false
          auto-activate-base: false
          show-channel-urls: true
          conda-remove-defaults: true

      - name: Build and upload the conda packages
        uses: EliaCereda/action-build-and-upload-conda-packages@main
        with:
          meta_yaml_dir: ${{ env.PACKAGE_DIR }}
          user: EliaCereda
          token: ${{ secrets.ANACONDA_TOKEN }} # Replace with the name of your Anaconda Token secret
